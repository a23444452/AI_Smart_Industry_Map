description: >-
  CPO（Co-Packaged Optics）把光通訊元件與邏輯晶片共同封裝，直接縮短電訊號的傳輸路徑，
  用以緩解 AI 資料中心持續攀升的傳輸功耗與頻寬瓶頸。此技術屬於半導體異質整合的尖端領域，
